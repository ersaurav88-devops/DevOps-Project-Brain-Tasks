Add:
version: 0.2
env:
  variables:
    AWS_STS_REGIONAL_ENDPOINTS: regional

phases:

install:
    commands:
      - echo "Installing kubectl..."
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x kubectl
      - mv ./kubectl /usr/local/bin/kubectl
      
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - ACCOUNT_ID=7945-2824-1533
      - REGION=us-east-1
      - REPOSITORY_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/brain-tasks-app
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $REPOSITORY_URI
      - echo "Connecting to EKS Cluster..."
      - aws eks update-kubeconfig --name brain-cluster --region us-east-1
      - aws sts get-caller-identity
      - kubectl get nodes

  build:
    commands:
      - echo "Building the Docker image..."
      - docker build -t brain-tasks-app .
      - docker tag brain-tasks-app:latest $REPOSITORY_URI:latest

  post_build:
    commands:
      - echo "Pushing the Docker image to ECR..."
      - docker push $REPOSITORY_URI:latest
      - kubectl apply -f deployment.yaml
      - kubectl apply -f service.yaml
      - echo "Deployment Complete!"
